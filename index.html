<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cinnamoroll Task Management ☁️💙</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Kanit:wght@200;300;400;500;600;800&display=swap');
        
        :root {
            --cinna-blue: #a5d8ff;
            --cinna-bg: #f0f9ff;
        }

        body { 
            font-family: 'Kanit', sans-serif; 
            background-color: var(--cinna-bg); 
            color: #495057;
            background-image: radial-gradient(#ffffff 20%, transparent 20%);
            background-size: 30px 30px;
        }

        .glass-card {
            background: white;
            border-radius: 2.5rem;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 10px 30px rgba(165, 216, 255, 0.25);
            transition: all 0.3s ease;
        }

        .cinna-gradient {
            background: linear-gradient(135deg, #a5d8ff 0%, #74c0fc 100%);
            box-shadow: 0 8px 20px rgba(116, 192, 252, 0.3);
        }

        #profilePreview {
            width: 130px; height: 130px; object-fit: cover;
            border: 5px solid white; border-radius: 24px;
            box-shadow: 0 8px 25px rgba(165, 216, 255, 0.4); cursor: pointer;
        }

        .day-node { 
            position: relative; cursor: pointer; display: flex; align-items: center; justify-content: center;
            height: 38px; width: 38px; margin: auto; border-radius: 50%;
        }
        .day-node:hover { background-color: rgba(165, 216, 255, 0.2); }
        .day-pending { color: #1971c2 !important; font-weight: 800 !important; }
        .day-done { color: #f06595 !important; font-weight: 800 !important; }
        .day-overdue { color: #ff6b6b !important; font-weight: 900 !important; text-shadow: 0 0 5px rgba(255, 107, 107, 0.2); }

        .tooltip {
            visibility: hidden; position: absolute; bottom: 120%; left: 50%; transform: translateX(-50%);
            background-color: white; border: 2px solid var(--cinna-blue); padding: 12px;
            border-radius: 18px; z-index: 50; opacity: 0; font-size: 11px; min-width: 160px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); pointer-events: none; transition: 0.2s;
        }
        .day-node:hover .tooltip { visibility: visible; opacity: 1; }
        .tooltip-item { display: block; margin-bottom: 4px; border-bottom: 1px dashed #f1f3f5; text-align: left; }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-7xl mx-auto">
        <div class="flex flex-col lg:flex-row items-center gap-8 mb-8 glass-card p-8 bg-white/70 backdrop-blur-md">
            <div class="relative">
                <input type="file" id="profileUpload" class="hidden" accept="image/*" onchange="loadProfile(event)">
                <img id="profilePreview" src="https://via.placeholder.com/130?text=Upload" onclick="document.getElementById('profileUpload').click()">
            </div>
            <div class="text-center lg:text-left flex-1">
                <input type="text" id="userName" value="Warm Wanichphan" class="bg-transparent text-3xl font-extrabold text-blue-400 focus:outline-none mb-1 w-full" onblur="saveProfileInfo()">
                <div class="w-full max-w-lg">
                    <input type="text" id="userNote" value="โน้ตประจำวัน: ท้องฟ้าวันนี้สดใส.. สู้ๆ นะคะ ☁️✨" 
                           class="bg-blue-50/50 hover:bg-blue-50 px-4 py-1 rounded-xl text-blue-400 font-light italic text-sm w-full border border-transparent focus:border-blue-200 focus:outline-none transition-all"
                           onblur="saveUserNote()">
                </div>
            </div>
            <div class="flex gap-3">
                <button onclick="loadFromCloud()" class="bg-white border-2 border-blue-200 text-blue-400 px-6 py-5 rounded-[2rem] font-bold text-lg flex items-center gap-3 transition-all hover:bg-blue-50">
                    <i class="fas fa-cloud-download-alt"></i> ดึงข้อมูล
                </button>
                <button onclick="openModal()" class="cinna-gradient text-white px-10 py-5 rounded-[2rem] font-bold text-lg flex items-center gap-3 transition-all hover:scale-105">
                    <i class="fas fa-plus-circle"></i> เพิ่มงานใหม่
                </button>
            </div>
        </div>

        <div class="grid grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
            <div class="glass-card p-6 text-center border-b-4 border-b-slate-200">
                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">งานทั้งหมด</p>
                <span id="statTotal" class="text-3xl font-extrabold text-slate-600">0</span>
            </div>
            <div class="glass-card p-6 text-center border-b-4 border-b-blue-300">
                <p class="text-[10px] font-bold text-blue-400 uppercase tracking-widest">กำลังทำ / รอตรวจ</p>
                <span id="statPending" class="text-3xl font-extrabold text-blue-500">0</span>
            </div>
            <div class="glass-card p-6 text-center border-b-4 border-b-pink-300">
                <p class="text-[10px] font-bold text-pink-400 uppercase tracking-widest">เสร็จแล้ว</p>
                <span id="statDone" class="text-3xl font-extrabold text-pink-500">0</span>
            </div>
            <div class="glass-card p-6 text-center border-b-4 border-b-red-300">
                <p class="text-[10px] font-bold text-red-400 uppercase tracking-widest">เกินกำหนด!</p>
                <span id="statOverdue" class="text-3xl font-extrabold text-red-500">0</span>
            </div>
        </div>

        <div class="flex flex-col lg:flex-row gap-8 mb-8 items-stretch">
            <div class="lg:w-2/3"><div class="glass-card p-8 h-[400px] flex flex-col"><canvas id="topBarChart"></canvas></div></div>
            <div class="lg:w-1/3">
                <div class="glass-card p-8 h-[400px]">
                    <div class="flex justify-between items-center mb-6">
                        <button onclick="changeMonth(-1)" class="text-blue-200"><i class="fas fa-chevron-left"></i></button>
                        <h4 id="calendarTitle" class="font-bold text-blue-400"></h4>
                        <button onclick="changeMonth(1)" class="text-blue-200"><i class="fas fa-chevron-right"></i></button>
                    </div>
                    <div id="calendarGrid" class="grid grid-cols-7 gap-1 text-center text-[10px]">
                        <div class="py-2 text-slate-300 font-bold uppercase">อา</div><div class="py-2 text-slate-300 font-bold uppercase">จ</div><div class="py-2 text-slate-300 font-bold uppercase">อ</div><div class="py-2 text-slate-300 font-bold uppercase">พ</div><div class="py-2 text-slate-300 font-bold uppercase">พฤ</div><div class="py-2 text-slate-300 font-bold uppercase">ศ</div><div class="py-2 text-slate-300 font-bold uppercase">ส</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="glass-card overflow-hidden mb-10 border-t-8 border-t-blue-300">
            <div class="p-8 border-b border-blue-50 bg-blue-50/20 flex justify-between items-center">
                <input type="text" id="todayTableName" value="☀️ ภารกิจวันนี้" class="bg-transparent font-bold text-blue-500 text-lg focus:outline-none w-full" onblur="saveTodayTableName()">
                <span class="text-[10px] bg-blue-400 text-white px-3 py-1 rounded-full font-bold whitespace-nowrap uppercase tracking-widest">Priority List</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-blue-50/10 text-[10px] font-bold text-blue-300 uppercase tracking-widest">
                        <tr>
                            <th class="p-6">ภารกิจ</th>
                            <th class="p-6 text-center">เริ่มงาน</th>
                            <th class="p-6 text-center">Deadline</th>
                            <th class="p-6 text-center">เหลืออีก (วัน)</th>
                            <th class="p-6 text-center">สถานะ</th>
                            <th class="p-6 text-right"></th>
                        </tr>
                    </thead>
                    <tbody id="todayTableBody" class="divide-y divide-blue-50"></tbody>
                </table>
            </div>
        </div>

        <div class="glass-card overflow-hidden mb-10">
            <div class="p-8 border-b border-blue-50 bg-white/30">
                <h3 class="font-bold text-slate-600 flex items-center gap-2">
                    <i class="fas fa-database text-blue-300"></i> รายการภารกิจทั้งหมด
                </h3>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left">
                    <thead class="bg-blue-50/20 text-[10px] font-bold text-blue-400 uppercase tracking-widest">
                        <tr>
                            <th class="p-6">ภารกิจ</th>
                            <th class="p-6 text-center">เริ่มงาน</th>
                            <th class="p-6 text-center">Deadline</th>
                            <th class="p-6 text-center">เหลืออีก (วัน)</th>
                            <th class="p-6 text-center">สถานะ</th>
                            <th class="p-6 text-right"></th>
                        </tr>
                    </thead>
                    <tbody id="taskTableBody" class="divide-y divide-blue-50"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="taskModal" class="fixed inset-0 bg-blue-900/10 backdrop-blur-sm hidden flex items-center justify-center z-50 p-4">
        <div class="bg-white p-10 rounded-[3.5rem] w-full max-w-xl shadow-2xl border-4 border-blue-50">
            <h2 id="modalTitle" class="text-2xl font-extrabold text-blue-400 mb-8">☁️ จัดการงาน</h2>
            <input type="hidden" id="editIndex">
            <div class="space-y-6">
                <input type="text" id="taskTitle" placeholder="ชื่อภารกิจ..." class="w-full p-5 bg-blue-50 border-0 rounded-3xl outline-none focus:ring-2 focus:ring-blue-200">
                <div class="grid grid-cols-2 gap-4">
                    <input type="date" id="taskStartDate" class="w-full p-5 bg-blue-50 border-0 rounded-3xl outline-none text-blue-500">
                    <input type="date" id="taskDeadline" class="w-full p-5 bg-blue-50 border-0 rounded-3xl outline-none text-blue-500">
                </div>
                <select id="taskPriority" class="w-full p-5 bg-blue-50 border-0 rounded-3xl outline-none text-blue-500">
                    <option value="ปกติ">ปกติ ☁️</option><option value="สำคัญ">สำคัญ ✨</option><option value="เร่งด่วน">เร่งด่วน 🔥</option>
                </select>
            </div>
            <div class="mt-10 flex gap-4"><button onclick="closeModal()" class="flex-1 font-bold text-slate-400">ยกเลิก</button><button onclick="saveTask()" class="flex-2 px-10 cinna-gradient text-white py-5 rounded-3xl font-bold">บันทึก</button></div>
        </div>
    </div>

    <script>
        // --- URL ของคุณที่แก้ปัญหา CORS แล้ว ---
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWMY90_trbXdafnlRtXHr8RgUjl9Rg4ezGukCPWZjL7USoyIaK_u_pQPOsT1PWYPcD/exec";

        let tasks = JSON.parse(localStorage.getItem('tasks_v10')) || [];
        let todayTasks = JSON.parse(localStorage.getItem('today_tasks_v10')) || [];
        let viewDate = new Date();
        let topBarChart;

        async function syncToCloud() {
            try {
                const payload = {
                    tasks: JSON.stringify(tasks),
                    todayTasks: JSON.stringify(todayTasks)
                };
                
                // ส่งแบบ POST ไปยัง Google Script
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // สำคัญมากสำหรับ Apps Script POST
                    cache: 'no-cache',
                    body: JSON.stringify(payload)
                });
                console.log("Synced to Cloud ☁️");
            } catch (e) { console.error("Sync failed", e); }
        }

        async function loadFromCloud() {
            const btn = event.currentTarget;
            const originalText = btn.innerHTML;
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> กำลังดึง...';
            
            try {
                const response = await fetch(SCRIPT_URL);
                const result = await response.json();
                
                if (result.status === "success" && result.data) {
                    // ปรับโครงสร้างข้อมูลที่ดึงกลับมา (ขึ้นอยู่กับว่าใน Sheets เก็บอย่างไร)
                    // กรณีนี้สมมติว่าคุณเก็บข้อมูลเป็นก้อน JSON ใน Sheets
                    if(result.data.length > 0) {
                        const cloudData = result.data[0]; // สมมติแถวแรกเก็บ JSON รวม
                        tasks = JSON.parse(cloudData.tasks || "[]");
                        todayTasks = JSON.parse(cloudData.todayTasks || "[]");
                    }
                    updateUI(false); 
                    alert('ดึงข้อมูลสำเร็จ! ☁️✨');
                }
            } catch (e) { 
                alert('ไม่พบข้อมูลบน Cloud หรือการเชื่อมต่อขัดข้อง');
            } finally {
                btn.innerHTML = originalText;
            }
        }

        function formatDate(d) { if(!d) return "-"; const [y,m,day] = d.split('-'); return `${day}-${m}-${y}`; }
        
        function getDaysLeft(dl) {
            if(!dl) return "-";
            const today = new Date(); today.setHours(0,0,0,0);
            const dDay = new Date(dl); dDay.setHours(0,0,0,0);
            const diff = Math.ceil((dDay - today) / (1000*60*60*24));
            return diff < 0 ? "เลยกำหนด" : (diff === 0 ? "วันนี้!" : diff);
        }

        function updateUI(shouldSync = true) {
            renderTaskTable();
            renderTodayTable();
            renderCalendar();
            
            const done = tasks.filter(t => t.status === 'เสร็จแล้ว').length;
            const pending = tasks.filter(t => t.status === 'กำลังดำเนินการ' || t.status === 'รอตรวจ').length;
            const overdue = tasks.filter(t => getDaysLeft(t.deadline) === "เลยกำหนด" && t.status !== 'เสร็จแล้ว').length;

            document.getElementById('statTotal').innerText = tasks.length;
            document.getElementById('statPending').innerText = pending;
            document.getElementById('statDone').innerText = done;
            document.getElementById('statOverdue').innerText = overdue;

            renderTopChart(done, pending, overdue);
            
            localStorage.setItem('tasks_v10', JSON.stringify(tasks));
            localStorage.setItem('today_tasks_v10', JSON.stringify(todayTasks));

            if(shouldSync) syncToCloud();
        }

        function renderTaskTable() {
            const tbody = document.getElementById('taskTableBody');
            tbody.innerHTML = tasks.map((t, i) => `
                <tr class="hover:bg-blue-50/40">
                    <td class="p-6">
                        <div class="flex flex-col"><span class="font-bold text-slate-600 ${t.status==='เสร็จแล้ว'?'line-through text-slate-300':''}">${t.title}</span><span class="text-[9px] font-bold text-blue-300 uppercase">${t.priority}</span></div>
                    </td>
                    <td class="p-6 text-center text-xs text-slate-400">${formatDate(t.startDate)}</td>
                    <td class="p-6 text-center text-xs font-bold text-blue-400">${formatDate(t.deadline)}</td>
                    <td class="p-6 text-center font-extrabold ${getDaysLeft(t.deadline)==='เลยกำหนด'?'text-red-400':'text-blue-500'}">${getDaysLeft(t.deadline)}</td>
                    <td class="p-6 text-center">
                        <select onchange="updateStatus(${i}, this.value, 'main')" class="bg-blue-50 text-[11px] font-bold rounded-full px-4 py-2 outline-none mx-auto block">
                            <option value="กำลังดำเนินการ" ${t.status==='กำลังดำเนินการ'?'selected':''}>⏳ กำลังดำเนินการ</option>
                            <option value="รอตรวจ" ${t.status==='รอตรวจ'?'selected':''}>🧐 รอตรวจ</option>
                            <option value="เสร็จแล้ว" ${t.status==='เสร็จแล้ว'?'selected':''}>☁️ เสร็จสมบูรณ์</option>
                        </select>
                    </td>
                    <td class="p-6 text-right">
                        <div class="flex gap-4 justify-end items-center">
                            <button onclick="copyToToday(${i})" class="text-blue-400 hover:text-blue-600 text-xs font-bold bg-blue-50 px-3 py-1 rounded-full"><i class="fas fa-sun"></i> ทำวันนี้</button>
                            <button onclick="editTask(${i})" class="text-blue-200 hover:text-blue-500"><i class="fas fa-edit"></i></button>
                            <button onclick="deleteTask(${i}, 'main')" class="text-slate-100 hover:text-red-300"><i class="fas fa-trash-alt"></i></button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function renderTodayTable() {
            const tbody = document.getElementById('todayTableBody');
            tbody.innerHTML = todayTasks.map((t, i) => `
                <tr class="bg-blue-50/5 hover:bg-blue-50/20">
                    <td class="p-6">
                        <div class="flex flex-col"><span class="font-bold text-slate-600">${t.title}</span><span class="text-[9px] font-bold text-blue-300 uppercase">${t.priority}</span></div>
                    </td>
                    <td class="p-6 text-center text-xs text-slate-400">${formatDate(t.startDate)}</td>
                    <td class="p-6 text-center text-xs font-bold text-blue-400">${formatDate(t.deadline)}</td>
                    <td class="p-6 text-center font-extrabold ${getDaysLeft(t.deadline)==='เลยกำหนด'?'text-red-400':'text-blue-500'}">${getDaysLeft(t.deadline)}</td>
                    <td class="p-6 text-center">
                        <select onchange="updateStatus(${i}, this.value, 'today')" class="bg-white text-[11px] font-bold rounded-full px-4 py-2 outline-none border border-blue-100 mx-auto block">
                            <option value="กำลังดำเนินการ" ${t.status==='กำลังดำเนินการ'?'selected':''}>⏳ กำลังทำ</option>
                            <option value="รอตรวจ" ${t.status==='รอตรวจ'?'selected':''}>🧐 รอตรวจ</option>
                            <option value="เสร็จแล้ว" ${t.status==='เสร็จแล้ว'?'selected':''}>☁️ เสร็จแล้ว</option>
                        </select>
                    </td>
                    <td class="p-6 text-right">
                        <button onclick="deleteTask(${i}, 'today')" class="text-slate-200 hover:text-red-300"><i class="fas fa-times-circle"></i></button>
                    </td>
                </tr>
            `).join('');
        }

        function copyToToday(i) {
            const newTask = {...tasks[i]};
            todayTasks.push(newTask);
            updateUI();
        }

        function updateStatus(i, val, type) {
            if(type === 'main') tasks[i].status = val;
            else todayTasks[i].status = val;
            updateUI();
        }

        function deleteTask(i, type) {
            if(!confirm('ลบรายการนี้ใช่ไหม?')) return;
            if(type === 'main') tasks.splice(i, 1);
            else todayTasks.splice(i, 1);
            updateUI();
        }

        function saveTask() {
            const title = document.getElementById('taskTitle').value;
            if(!title) return alert('ใส่ชื่อภารกิจก่อนน้า');
            const idx = document.getElementById('editIndex').value;
            const obj = {
                title,
                startDate: document.getElementById('taskStartDate').value,
                deadline: document.getElementById('taskDeadline').value,
                priority: document.getElementById('taskPriority').value,
                status: idx===""?'กำลังดำเนินการ':tasks[idx].status
            };
            if(idx==="") tasks.push(obj); else tasks[idx] = obj;
            updateUI(); closeModal();
        }

        function renderTopChart(done, pending, overdue) {
            const ctx = document.getElementById('topBarChart').getContext('2d');
            if (topBarChart) topBarChart.destroy();
            Chart.defaults.font.family = 'Kanit';
            topBarChart = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['เสร็จแล้ว 🌸', 'กำลังทำ/รอ ☁️', 'เกินกำหนด 🔥'],
                    datasets: [{ data: [done, pending, overdue], backgroundColor: ['#ffdeeb', '#a5d8ff', '#ffc9c9'], borderRadius: 12, barThickness: 35 }]
                },
                options: { maintainAspectRatio: false, indexAxis: 'y', plugins: { legend: { display: false } },
                    scales: { x: { grid: { display: false }, ticks: { stepSize: 1 } }, y: { grid: { display: false }, ticks: { font: { weight: '600' } } } }
                }
            });
        }

        function renderCalendar() {
            const grid = document.getElementById('calendarGrid');
            const title = document.getElementById('calendarTitle');
            const headers = Array.from(grid.children).slice(0, 7);
            grid.innerHTML = ''; headers.forEach(h => grid.appendChild(h));
            const y = viewDate.getFullYear(), m = viewDate.getMonth();
            title.innerText = new Intl.DateTimeFormat('th-TH', { month: 'long', year: 'numeric' }).format(viewDate);
            for (let i = 0; i < new Date(y, m, 1).getDay(); i++) grid.innerHTML += `<div></div>`;
            for (let d = 1; d <= new Date(y, m + 1, 0).getDate(); d++) {
                const ds = `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const daily = tasks.filter(t => t.deadline === ds);
                let cls = "day-node text-slate-200 ";
                let tipItems = "";
                if(daily.length > 0) {
                    const hasOverdue = daily.some(t => getDaysLeft(t.deadline) === "เลยกำหนด" && t.status !== 'เสร็จแล้ว');
                    const allDone = daily.every(t => t.status === 'เสร็จแล้ว');
                    if (hasOverdue) cls += "day-overdue";
                    else if (allDone) cls += "day-done";
                    else cls += "day-pending";
                    tipItems = daily.map(t => {
                        const isOver = getDaysLeft(t.deadline) === "เลยกำหนด" && t.status !== 'เสร็จแล้ว';
                        const colorClass = t.status === 'เสร็จแล้ว' ? 'text-pink-400' : (isOver ? 'text-red-500 font-bold' : 'text-blue-400');
                        return `<span class="tooltip-item ${colorClass}">${isOver ? '🔥 ' : ''}${t.title}</span>`;
                    }).join('');
                }
                grid.innerHTML += `<div class="${cls}">${d}<div class="tooltip">${tipItems || 'ไม่มีงาน'}</div></div>`;
            }
        }

        function editTask(i) {
            document.getElementById('taskTitle').value = tasks[i].title;
            document.getElementById('taskStartDate').value = tasks[i].startDate || "";
            document.getElementById('taskDeadline').value = tasks[i].deadline || "";
            document.getElementById('taskPriority').value = tasks[i].priority;
            document.getElementById('editIndex').value = i;
            openModal();
        }

        function openModal() { document.getElementById('taskModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('taskModal').classList.add('hidden'); document.getElementById('editIndex').value = ""; }
        function changeMonth(s) { viewDate.setMonth(viewDate.getMonth() + s); renderCalendar(); }
        function saveProfileInfo() { localStorage.setItem('c_name_v10', document.getElementById('userName').value); }
        function saveUserNote() { localStorage.setItem('c_note_v10', document.getElementById('userNote').value); }
        function saveTodayTableName() { localStorage.setItem('c_today_name_v10', document.getElementById('todayTableName').value); }
        function loadProfile(e) {
            const r = new FileReader();
            r.onload = () => { document.getElementById('profilePreview').src = r.result; localStorage.setItem('c_img_v10', r.result); };
            r.readAsDataURL(e.target.files[0]);
        }

        // โหลดข้อมูลพื้นฐาน
        const sn = localStorage.getItem('c_name_v10'), st = localStorage.getItem('c_note_v10'), si = localStorage.getItem('c_img_v10'), tn = localStorage.getItem('c_today_name_v10');
        if(sn) document.getElementById('userName').value = sn;
        if(st) document.getElementById('userNote').value = st;
        if(si) document.getElementById('profilePreview').src = si;
        if(tn) document.getElementById('todayTableName').value = tn;
        
        updateUI(false); // เริ่มต้น
    </script>
</body>
</html>
