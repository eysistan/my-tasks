<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tasks - Warm Wanichphan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f0f2f5; }
        .task-card { transition: all 0.3s ease; }
        .task-card:hover { transform: translateY(-5px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .loading-shimmer { background: linear-gradient(90deg, #eff1f3 25%, #e2e2e2 50%, #eff1f3 75%); background-size: 400% 100%; animation: shimmer 2s infinite; }
        @keyframes shimmer { 0% { background-position: 100% 0; } 100% { background-position: -100% 0; } }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-4xl mx-auto">
        <div class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4 bg-white p-6 rounded-2xl shadow-sm">
            <div>
                <h1 class="text-3xl font-bold text-blue-600">Warm Wanichphan</h1>
                <p class="text-gray-500">จัดการรายการงานบนระบบ Cloud</p>
            </div>
            <div class="flex gap-2">
                <button onclick="loadTasks()" class="bg-blue-500 hover:bg-blue-600 text-white px-6 py-2 rounded-xl transition flex items-center gap-2">
                    <span>🔄</span> ดึงข้อมูล
                </button>
                <button onclick="openModal()" class="bg-green-500 hover:bg-green-600 text-white px-6 py-2 rounded-xl transition flex items-center gap-2">
                    <span>+</span> เพิ่มงานใหม่
                </button>
            </div>
        </div>

        <div id="taskList" class="grid grid-cols-1 md:grid-cols-2 gap-4">
            <div class="col-span-full text-center py-10 text-gray-400">กดปุ่ม "ดึงข้อมูล" เพื่อเริ่มต้น</div>
        </div>
    </div>

    <div id="taskModal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4 z-50">
        <div class="bg-white rounded-2xl p-6 w-full max-w-md shadow-2xl">
            <h2 class="text-xl font-bold mb-4 text-gray-800">📝 เพิ่มรายการงานใหม่</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm text-gray-600 mb-1">หัวข้อรายการ</label>
                    <input type="text" id="taskTitle" class="w-full border rounded-lg px-4 py-2 focus:ring-2 focus:ring-blue-400 outline-none">
                </div>
                <div>
                    <label class="block text-sm text-gray-600 mb-1">สถานะ</label>
                    <select id="taskStatus" class="w-full border rounded-lg px-4 py-2">
                        <option value="กำลังทำ">กำลังทำ</option>
                        <option value="เสร็จแล้ว">เสร็จแล้ว</option>
                        <option value="รอดำเนินการ">รอดำเนินการ</option>
                    </select>
                </div>
                <div class="flex gap-2 pt-2">
                    <button onclick="addTask()" id="submitBtn" class="flex-1 bg-blue-600 text-white py-2 rounded-lg font-medium hover:bg-blue-700">บันทึกข้อมูล</button>
                    <button onclick="closeModal()" class="flex-1 bg-gray-100 text-gray-600 py-2 rounded-lg hover:bg-gray-200">ยกเลิก</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // URL ของคุณที่แก้ปัญหา CORS แล้ว
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWMY90_trbXdafnlRtXHr8RgUjl9Rg4ezGukCPWZjL7USoyIaK_u_pQPOsT1PWYPcD/exec";

        // ฟังก์ชันดึงข้อมูล
        async function loadTasks() {
            const container = document.getElementById('taskList');
            container.innerHTML = '<div class="col-span-full py-10 text-center">กำลังดึงข้อมูลจาก Cloud...</div>';

            try {
                const response = await fetch(SCRIPT_URL);
                const result = await response.json();

                if (result.status === "success") {
                    displayTasks(result.data);
                } else {
                    alert("เกิดข้อผิดพลาด: " + result.message);
                }
            } catch (error) {
                console.error(error);
                alert("ไม่สามารถเชื่อมต่อ Cloud ได้ (ตรวจสอบการ Deploy หรือ CORS)");
            }
        }

        // ฟังก์ชันแสดงผลข้อมูล
        function displayTasks(tasks) {
            const container = document.getElementById('taskList');
            if (tasks.length === 0) {
                container.innerHTML = '<div class="col-span-full text-center py-10 text-gray-400">ยังไม่มีข้อมูลในระบบ</div>';
                return;
            }

            container.innerHTML = tasks.map(task => `
                <div class="task-card bg-white p-5 rounded-2xl shadow-sm border-l-4 ${task.status === 'เสร็จแล้ว' ? 'border-green-500' : 'border-blue-500'}">
                    <div class="flex justify-between items-start">
                        <h3 class="font-medium text-lg text-gray-800">${task.title || 'ไม่มีหัวข้อ'}</h3>
                        <span class="text-xs px-2 py-1 rounded-full ${task.status === 'เสร็จแล้ว' ? 'bg-green-100 text-green-600' : 'bg-blue-100 text-blue-600'}">
                            ${task.status || 'รอดำเนินการ'}
                        </span>
                    </div>
                    <p class="text-sm text-gray-400 mt-2">ID: ${task.id || '-'}</p>
                </div>
            `).join('');
        }

        // ฟังก์ชันเพิ่มข้อมูล
        async function addTask() {
            const title = document.getElementById('taskTitle').value;
            const status = document.getElementById('taskStatus').value;
            const btn = document.getElementById('submitBtn');

            if (!title) return alert("กรุณากรอกหัวข้อ");

            btn.disabled = true;
            btn.innerText = "กำลังบันทึก...";

            try {
                // สร้างข้อมูลจำลอง (คุณสามารถปรับหัวข้อให้ตรงกับชื่อ Column ใน Sheet ได้)
                const payload = {
                    id: Date.now().toString().slice(-4),
                    title: title,
                    status: status
                };

                await fetch(SCRIPT_URL, {
                    method: "POST",
                    body: JSON.stringify(payload)
                });

                alert("บันทึกสำเร็จ!");
                closeModal();
                loadTasks(); // รีโหลดข้อมูลใหม่
            } catch (error) {
                alert("บันทึกไม่สำเร็จ ลองเช็คสิทธิ์การเข้าถึงใน Google Script");
            } finally {
                btn.disabled = false;
                btn.innerText = "บันทึกข้อมูล";
            }
        }

        // ฟังก์ชันจัดการ Modal
        function openModal() { document.getElementById('taskModal').classList.remove('hidden'); }
        function closeModal() { document.getElementById('taskModal').classList.add('hidden'); }
    </script>
</body>
</html>
