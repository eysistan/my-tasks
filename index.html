<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tasks - Warm Wanichphan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f4f7f9; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-gray-200 rounded-xl"></div>
                <div>
                    <h1 class="text-xl font-bold text-blue-800">Warm Wanichphan</h1>
                    <p class="text-xs text-gray-400">โน้ตประจำวัน: ท้องฟ้าวันนี้สดใส.. สู้ๆ นะคะ ☁️✨</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="fetchData()" class="bg-blue-100 text-blue-600 px-4 py-2 rounded-xl text-sm">🔄 กำลังดึง...</button>
                <button onclick="openModal()" class="bg-blue-500 text-white px-4 py-2 rounded-xl text-sm">+ เพิ่มงานใหม่</button>
            </div>
        </div>

        <div class="grid grid-cols-4 gap-4 mb-8">
            <div class="bg-gray-100 p-4 rounded-2xl text-center">
                <p class="text-xs text-gray-500">งานทั้งหมด</p>
                <span id="total" class="text-xl font-bold">0</span>
            </div>
            <div class="bg-blue-50 p-4 rounded-2xl text-center">
                <p class="text-xs text-blue-500">กำลังทำ / รอตรวจ</p>
                <span id="pending" class="text-xl font-bold">0</span>
            </div>
            <div class="bg-pink-50 p-4 rounded-2xl text-center">
                <p class="text-xs text-pink-500">เสร็จแล้ว</p>
                <span id="completed" class="text-xl font-bold">0</span>
            </div>
            <div class="bg-red-50 p-4 rounded-2xl text-center">
                <p class="text-xs text-red-500">เกินกำหนด!</p>
                <span class="text-xl font-bold">0</span>
            </div>
        </div>

        <div id="taskContainer" class="grid grid-cols-1 gap-4">
            </div>
    </div>

    <script>
        // ใช้ URL ล่าสุดของคุณ
        const API_URL = "https://script.google.com/macros/s/AKfycbzWMY90_trbXdafnlRtXHr8RgUjl9Rg4ezGukCPWZjL7USoyIaK_u_pQPOsT1PWYPcD/exec";

        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                const result = await response.json();
                if (result.status === "success") {
                    updateUI(result.data);
                }
            } catch (error) {
                console.error("เชื่อมต่อผิดพลาด", error);
                alert("ไม่พบข้อมูลบน Cloud (ตรวจสอบการ Deploy ใน Apps Script ว่าเลือกเป็น Anyone หรือยัง)");
            }
        }

        function updateUI(tasks) {
            const container = document.getElementById('taskContainer');
            document.getElementById('total').innerText = tasks.length;
            document.getElementById('pending').innerText = tasks.filter(t => t.status !== 'เสร็จแล้ว').length;
            document.getElementById('completed').innerText = tasks.filter(t => t.status === 'เสร็จแล้ว').length;

            container.innerHTML = tasks.map(task => `
                <div class="bg-white p-4 rounded-xl shadow-sm flex justify-between items-center">
                    <div>
                        <p class="font-medium">${task.title || 'ไม่มีชื่อ'}</p>
                        <p class="text-xs text-gray-400">ID: ${task.id || '-'}</p>
                    </div>
                    <span class="text-xs px-3 py-1 rounded-full ${task.status === 'เสร็จแล้ว' ? 'bg-green-100 text-green-600' : 'bg-blue-100 text-blue-600'}">
                        ${task.status || 'กำลังทำ'}
                    </span>
                </div>
            `).join('');
        }

        // โหลดข้อมูลทันทีที่เปิดหน้า
        window.onload = fetchData;
    </script>
</body>
</html>
